<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">MENA drought early warning workflow</title>
  <desc id="desc">A six-step workflow from Earth Engine data to forecast tables, charts, and maps.</desc>
  <rect width="980" height="420" fill="#f7f8fb"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#18212f">Project workflow</text>
  <text x="490" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4f5f73">Monthly satellite and climate data are turned into drought forecasts.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#526173"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#14213d" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g font-family="Arial, sans-serif">
    <g filter="url(#shadow)">
      <rect x="45" y="130" width="132" height="116" rx="8" fill="#ffffff" stroke="#b8c2d0"/>
      <text x="111" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">Earth Engine</text>
      <text x="111" y="190" text-anchor="middle" font-size="12" fill="#516172">NDVI</text>
      <text x="111" y="209" text-anchor="middle" font-size="12" fill="#516172">Rainfall</text>
      <text x="111" y="228" text-anchor="middle" font-size="12" fill="#516172">Temperature</text>
    </g>
    <line x1="177" y1="188" x2="225" y2="188" stroke="#526173" stroke-width="2.4" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="230" y="130" width="132" height="116" rx="8" fill="#ffffff" stroke="#b8c2d0"/>
      <text x="296" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">MENA grid</text>
      <text x="296" y="190" text-anchor="middle" font-size="12" fill="#516172">1 degree cells</text>
      <text x="296" y="209" text-anchor="middle" font-size="12" fill="#516172">monthly rows</text>
      <text x="296" y="228" text-anchor="middle" font-size="12" fill="#516172">lat and lon</text>
    </g>
    <line x1="362" y1="188" x2="410" y2="188" stroke="#526173" stroke-width="2.4" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="415" y="130" width="132" height="116" rx="8" fill="#ffffff" stroke="#b8c2d0"/>
      <text x="481" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">Features</text>
      <text x="481" y="190" text-anchor="middle" font-size="12" fill="#516172">anomalies</text>
      <text x="481" y="209" text-anchor="middle" font-size="12" fill="#516172">rolling means</text>
      <text x="481" y="228" text-anchor="middle" font-size="12" fill="#516172">drought class</text>
    </g>
    <line x1="547" y1="188" x2="595" y2="188" stroke="#526173" stroke-width="2.4" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="600" y="130" width="132" height="116" rx="8" fill="#ffffff" stroke="#b8c2d0"/>
      <text x="666" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">Targets</text>
      <text x="666" y="190" text-anchor="middle" font-size="12" fill="#516172">class at t+1</text>
      <text x="666" y="209" text-anchor="middle" font-size="12" fill="#516172">class at t+3</text>
      <text x="666" y="228" text-anchor="middle" font-size="12" fill="#516172">class at t+6</text>
    </g>
    <line x1="732" y1="188" x2="780" y2="188" stroke="#526173" stroke-width="2.4" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="785" y="130" width="150" height="116" rx="8" fill="#ffffff" stroke="#b8c2d0"/>
      <text x="860" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">Models</text>
      <text x="860" y="190" text-anchor="middle" font-size="12" fill="#516172">Persistence</text>
      <text x="860" y="209" text-anchor="middle" font-size="12" fill="#516172">Random Forest</text>
      <text x="860" y="228" text-anchor="middle" font-size="12" fill="#516172">spatial holdout</text>
    </g>

    <path d="M 860 246 C 860 312, 666 314, 666 326" fill="none" stroke="#526173" stroke-width="2.4" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="529" y="308" width="274" height="70" rx="8" fill="#ffffff" stroke="#b8c2d0"/>
      <text x="666" y="337" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">Outputs</text>
      <text x="666" y="360" text-anchor="middle" font-size="12" fill="#516172">metrics, probabilities, risk tables, uncertainty maps</text>
    </g>
  </g>
</svg>
