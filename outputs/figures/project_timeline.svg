<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300" role="img" aria-labelledby="title desc">
  <title id="title">Project time split</title>
  <desc id="desc">Timeline from 2001 to 2024 showing training, validation, testing, and the selected forecast issue date.</desc>
  <rect width="980" height="300" fill="#f7f8fb"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#18212f">Time split used for forecasting</text>
  <text x="490" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4f5f73">The model is trained on earlier years and checked on later years.</text>

  <g font-family="Arial, sans-serif">
    <line x1="90" y1="154" x2="890" y2="154" stroke="#97a6ba" stroke-width="4" stroke-linecap="round"/>
    <rect x="90" y="124" width="600" height="60" rx="6" fill="#2e86ab"/>
    <rect x="690" y="124" width="124" height="60" rx="6" fill="#f18f01"/>
    <rect x="814" y="124" width="76" height="60" rx="6" fill="#6f7c8f"/>
    <line x1="875" y1="108" x2="875" y2="205" stroke="#c73e1d" stroke-width="3"/>
    <circle cx="875" cy="154" r="7" fill="#c73e1d"/>

    <text x="390" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Training</text>
    <text x="390" y="170" text-anchor="middle" font-size="12" fill="#ffffff">2001 to 2018</text>
    <text x="752" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Validation</text>
    <text x="752" y="170" text-anchor="middle" font-size="12" fill="#ffffff">2019 to 2021</text>
    <text x="852" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Test</text>
    <text x="852" y="170" text-anchor="middle" font-size="12" fill="#ffffff">2022 to 2024</text>

    <text x="90" y="218" text-anchor="middle" font-size="13" fill="#3f4b59">2001-01</text>
    <text x="690" y="218" text-anchor="middle" font-size="13" fill="#3f4b59">2018-12</text>
    <text x="814" y="218" text-anchor="middle" font-size="13" fill="#3f4b59">2021-12</text>
    <text x="890" y="218" text-anchor="middle" font-size="13" fill="#3f4b59">2024-12</text>
    <text x="875" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#c73e1d">issue: 2024-09</text>
  </g>
</svg>
