<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">MENA study area grid map</title>
  <desc id="desc">A schematic map of the project bounding box from 17 degrees west to 65 degrees east and 12 to 42 degrees north.</desc>
  <rect width="980" height="500" fill="#f7f8fb"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#18212f">MENA study area</text>
  <text x="490" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4f5f73">Bounding box: 17W to 65E, 12N to 42N. Grid size: 1 degree.</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="105" width="820" height="300" fill="#e9eff6" stroke="#738196" stroke-width="2"/>
    <rect x="120" y="135" width="740" height="240" fill="#fff9ed" stroke="#c73e1d" stroke-width="3"/>

    <g stroke="#d9caa7" stroke-width="1">
      <line x1="210" y1="135" x2="210" y2="375"/>
      <line x1="300" y1="135" x2="300" y2="375"/>
      <line x1="390" y1="135" x2="390" y2="375"/>
      <line x1="480" y1="135" x2="480" y2="375"/>
      <line x1="570" y1="135" x2="570" y2="375"/>
      <line x1="660" y1="135" x2="660" y2="375"/>
      <line x1="750" y1="135" x2="750" y2="375"/>
      <line x1="120" y1="195" x2="860" y2="195"/>
      <line x1="120" y1="255" x2="860" y2="255"/>
      <line x1="120" y1="315" x2="860" y2="315"/>
    </g>

    <path d="M 146 236 C 186 190, 230 170, 278 172 C 330 175, 358 204, 394 214 C 452 230, 500 200, 550 210 C 608 222, 644 265, 710 258 C 764 252, 805 220, 839 206 L 839 375 L 146 375 Z" fill="#d8e7cf" opacity="0.88" stroke="#6f8f61" stroke-width="2"/>
    <path d="M 478 203 C 510 188, 542 193, 558 220 C 570 242, 562 267, 540 282 C 510 302, 472 292, 458 264 C 446 240, 454 214, 478 203 Z" fill="#f0d7a1" opacity="0.85" stroke="#b88d3c" stroke-width="2"/>
    <path d="M 585 262 C 620 244, 650 252, 665 279 C 681 310, 666 346, 632 359 C 598 372, 568 350, 562 319 C 557 294, 565 273, 585 262 Z" fill="#f0d7a1" opacity="0.85" stroke="#b88d3c" stroke-width="2"/>

    <text x="162" y="260" font-size="14" fill="#2f3b4a">North Africa</text>
    <text x="453" y="194" font-size="14" fill="#2f3b4a">Eastern Mediterranean</text>
    <text x="576" y="336" font-size="14" fill="#2f3b4a">Arabian Peninsula</text>
    <text x="684" y="236" font-size="14" fill="#2f3b4a">Iran area</text>
    <text x="140" y="118" font-size="13" font-weight="700" fill="#c73e1d">study grid</text>

    <g fill="#3f4b59" font-size="13">
      <text x="118" y="424" text-anchor="middle">17W</text>
      <text x="300" y="424" text-anchor="middle">0</text>
      <text x="480" y="424" text-anchor="middle">20E</text>
      <text x="660" y="424" text-anchor="middle">40E</text>
      <text x="860" y="424" text-anchor="middle">65E</text>
      <text x="62" y="379" text-anchor="end">12N</text>
      <text x="62" y="319" text-anchor="end">20N</text>
      <text x="62" y="259" text-anchor="end">28N</text>
      <text x="62" y="199" text-anchor="end">35N</text>
      <text x="62" y="139" text-anchor="end">42N</text>
    </g>

    <line x1="120" y1="405" x2="860" y2="405" stroke="#526173" stroke-width="1.5"/>
    <line x1="80" y1="375" x2="80" y2="135" stroke="#526173" stroke-width="1.5"/>
    <text x="490" y="458" text-anchor="middle" font-size="13" fill="#4f5f73">This is a simple locator map for the project area, not a country-boundary map.</text>
  </g>
</svg>
